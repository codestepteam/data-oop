services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: data-oop-falkordb
    ports:
      - "6380:6379"
      - "3009:3000"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  falkordb_data:
